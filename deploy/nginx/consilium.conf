# nginx site for consilium-api.
#
# Minimal HTTP-only config — run `certbot --nginx -d <domain>` once and
# certbot rewrites this file inline, adding the :443 server block with
# ssl_certificate + ssl_certificate_key, and flipping the :80 block to
# a 301 redirect. Renewal handled by the certbot.timer unit.
#
# Drop in /etc/nginx/sites-available/consilium and symlink to
# sites-enabled/. `deploy/install.sh` does this automatically.

server {
    listen 80;
    server_name consilium.89.167.73.98.nip.io;

    # Let's Encrypt http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Pack uploads up to 10MB + multipart overhead
    client_max_body_size 12M;

    # Long debates: SSE keeps the connection open. Disable buffering so
    # events flush to the client immediately.
    proxy_read_timeout 2h;
    proxy_send_timeout 2h;
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass http://127.0.0.1:8421;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";  # required for SSE keep-alive
    }
}
